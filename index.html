<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon.png" />
    <link rel="shortcut icon" href="/favicon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#c07a30" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="World Tracker" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <title>Right World Tracker — Track Every Country & Region You've Visited</title>
    <meta name="description" content="Track every country, US state, Swiss canton, national park, and region you've visited on an interactive world map. Compete with friends, earn achievements, set a bucket list, and explore offline." />
    <meta name="keywords" content="world tracker, countries visited, travel map, interactive map, swiss cantons, us states, national parks, travel achievements, bucket list, visited countries" />
    <link rel="canonical" href="https://www.right-world-tracker.world/" />
    <meta name="google-site-verification" content="zs2SKElBdPlwMLnpfwx5xljHVkAgPzkVTJcYIC3oCEI" />
    <meta name="google-site-verification" content="VwLX0PesAfcK3O7iGYyCUizgc5JdRc7x3aqW5aSeddU" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.right-world-tracker.world/" />
    <meta property="og:title" content="Right World Tracker — Track Every Country & Region You've Visited" />
    <meta property="og:description" content="Track every country, US state, Swiss canton, national park, and region you've visited on an interactive world map. Compete with friends, earn achievements, set a bucket list, and explore offline." />
    <meta property="og:image" content="https://www.right-world-tracker.world/logo.webp" />
    <meta property="og:site_name" content="Right World Tracker" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Right World Tracker — Track Every Country & Region You've Visited" />
    <meta name="twitter:description" content="Track every country, US state, Swiss canton, national park, and region you've visited on an interactive world map. Compete with friends, earn achievements, set a bucket list, and explore offline." />
    <meta name="twitter:image" content="https://www.right-world-tracker.world/logo.webp" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body>
    <!-- Liquid Glass SVG distortion filter -->
    <svg style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
      <defs>
        <filter id="lg-distortion" x="0%" y="0%" width="100%" height="100%">
          <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="3" seed="2" result="noise" />
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="6" xChannelSelector="R" yChannelSelector="G" />
        </filter>
      </defs>
    </svg>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
