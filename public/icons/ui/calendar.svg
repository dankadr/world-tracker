  <line x1="8" y1="3" x2="8" y2="7"/>
  <line x1="16" y1="3" x2="16" y2="7"/>
  <!-- date dots -->
  <rect x="7" y="13" width="2" height="2" rx="0.3" fill="#c07a30"/>
  <rect x="11" y="13" width="2" height="2" rx="0.3" fill="#c07a30"/>
  <rect x="15" y="13" width="2" height="2" rx="0.3" fill="#c07a30"/>
  <rect x="7" y="17" width="2" height="2" rx="0.3" fill="#c07a30"/>
  <rect x="11" y="17" width="2" height="2" rx="0.3" fill="#c07a30"/>
</svg>
