<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#c07a30" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- calendar body -->
  <rect x="3" y="5" width="18" height="17" rx="1.5" fill="#d89648" fill-opacity="0.15"/>
  <rect x="3" y="5" width="18" height="17" rx="1.5"/>
