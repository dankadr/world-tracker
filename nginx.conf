server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API and auth requests to backend
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /auth/ {
        proxy_pass http://backend:8000/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy Nominatim geocoding requests
    location /nominatim/ {
        proxy_pass https://nominatim.openstreetmap.org/;
        proxy_set_header Host nominatim.openstreetmap.org;
        proxy_set_header User-Agent "TravelTracker/1.0";
        proxy_ssl_server_name on;
    }

    # Serve frontend SPA
    location / {
        try_files $uri $uri/ /index.html;
    }
}
