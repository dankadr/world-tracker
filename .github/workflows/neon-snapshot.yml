name: Neon — Create DB Snapshot

on:
  workflow_dispatch:
    inputs:
      label:
        description: 'Optional label (appended to snapshot name)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  snapshot:
    name: Snapshot main branch
    runs-on: ubuntu-latest
    # Only the repo owner can run this
    if: github.actor == 'dankadr'
    env:
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
      NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
      SNAPSHOT_LABEL: ${{ github.event.inputs.label }}
    steps:
      - name: Create snapshot branch from main
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%d-%H%M%S")
          SNAPSHOT_NAME="snapshot-${TIMESTAMP}${SNAPSHOT_LABEL:+-$SNAPSHOT_LABEL}"

          MAIN_BRANCH_ID=$(curl -sf \
            -H "Authorization: Bearer $NEON_API_KEY" \
            "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/branches" \
            | jq -r '.branches[] | select(.default == true) | .id')

          if [ -z "$MAIN_BRANCH_ID" ]; then
            echo "Error: could not find default branch"
            exit 1
          fi

          echo "Creating snapshot '$SNAPSHOT_NAME' from branch $MAIN_BRANCH_ID..."

          RESPONSE=$(curl -sf -X POST \
            -H "Authorization: Bearer $NEON_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"branch\": {\"name\": \"$SNAPSHOT_NAME\", \"parent_id\": \"$MAIN_BRANCH_ID\"}}" \
            "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/branches")

          BRANCH_ID=$(echo "$RESPONSE" | jq -r '.branch.id')
          echo "Snapshot created: $SNAPSHOT_NAME ($BRANCH_ID)"
